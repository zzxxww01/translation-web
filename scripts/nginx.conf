# Translation Agent - Nginx 反向代理配置
# 用途：生产环境 HTTPS 配置

# HTTP 重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name translate.your-domain.com;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name translate.your-domain.com;

    # SSL 证书（使用 Let's Encrypt）
    ssl_certificate /etc/letsencrypt/live/translate.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/translate.your-domain.com/privkey.pem;

    # SSL 配置（Mozilla Intermediate）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 限制请求体大小（100MB）
    client_max_body_size 100M;

    # 日志
    access_log /var/log/nginx/translation-agent-access.log;
    error_log /var/log/nginx/translation-agent-error.log;

    # 静态文件缓存
    location /assets/ {
        proxy_pass http://127.0.0.1:54321;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 和 SSE 端点
    location /api/ {
        proxy_pass http://127.0.0.1:54321;
        proxy_http_version 1.1;

        # WebSocket 和 SSE 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # 真实 IP 传递
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 必须禁用缓冲
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 75s;

        # 限流（可选）
        # limit_req zone=api_limit burst=20 nodelay;
    }

    # 前端应用
    location / {
        proxy_pass http://127.0.0.1:54321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查（内部使用）
    location /health {
        proxy_pass http://127.0.0.1:54321/api/health;
        access_log off;
    }
}

# 限流配置（可选）
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
